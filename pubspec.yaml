name: easy_ui
description: "Easy UI Flutter component library."
version: 0.0.1

environment:
  sdk: ^3.7.2
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  shadcn_flutter: ^0.0.36
  flutter_svg: ^2.2.0
  popover: ^0.3.1
  equatable: ^2.0.5
  lottie: ^3.3.0
  #  for markdown start
  # latex公式支持 最新版有bug，故使用指定版本
  flutter_math_fork: 0.7.3
  markdown: ^7.3.0
  flutter_syntax_view: ^4.1.7
  easy_image_viewer: ^1.5.1
  flutter_widget_from_html_core: ^0.16.0
  html: ^0.15.6
  highlight: ^0.7.0
  flutter_highlight: ^0.7.0
  # to click link
  url_launcher: ^6.3.1
  # to get the index number on scroll for listview
  visibility_detector: ^0.4.0+2
  # make listview available to jump to index
  scroll_to_index: ^3.0.1
  #  for markdown end
  extended_image: ^9.1.0
  vector_graphics: ^1.1.19
  file_picker: ^9.0.1
  cached_network_image: ^3.4.1
  two_dimensional_scrollables: ^0.3.7
  dotted_border: ^2.1.0
  desktop_drop: ^0.6.0
  scrollable_positioned_list: ^0.3.8

  # toast依赖
  pausable_timer: ^3.1.0+3
  iconsax_flutter: ^1.0.0
  provider: ^6.1.5+1
  infinite_scroll_pagination: ^5.1.1
  collection: ^1.19.1
  shimmer: ^3.0.0
  photo_view: ^0.15.0
  pixel_snap: ^0.1.5
  app_settings: 6.1.1
  flutter_local_notifications: ^19.5.0

  # H5
  flutter_inappwebview: ^6.1.5
  window_manager: ^0.4.3
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  archive: ^3.6.1
  crypto: ^3.0.0

  # Direct imports used by migrated source files.
  async: ^2.12.0
  http: ^1.6.0
  http_client_helper: ^3.0.0
  image: ^4.3.0
  path: ^1.9.1
  uuid: ^4.5.2
  web: ^1.1.1

  # pdf
  pdfrx: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/svgs/
    - assets/json/
    - assets/animations/
    - assets/apps/
  generate: true
  fonts:
    - family: HarmonyOS_SansSC
      fonts:
        - asset: fonts/HarmonyOS_SansSC_Regular.ttf
          weight: 300
        - asset: fonts/HarmonyOS_SansSC_Regular.ttf
          weight: 400
        - asset: fonts/HarmonyOS_SansSC_Regular.ttf
          weight: 500
        - asset: fonts/HarmonyOS_SansSC_Regular.ttf
          weight: 600
        - asset: fonts/HarmonyOS_SansSC_Bold.ttf
          weight: 700
