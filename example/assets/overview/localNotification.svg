            </g>

            <g id="Close-Btn-Placeholder" transform="translate(270.000000, 15.000000)">
                <circle id="Close-Bg" fill="#E0E0E0" cx="10" cy="10" r="10"></circle>
                <path d="M7,7 L13,13 M13,7 L7,13" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"></path>
