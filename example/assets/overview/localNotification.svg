<?xml version="1.0" encoding="UTF-8"?>
<svg width="320px" height="100px" viewBox="0 0 320 100" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>Notification Component Skeleton</title>
    <g id="组件骨架图-通知" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g id="Notification-Card" transform="translate(10.000000, 10.000000)">
            
            <rect id="Card-Container" stroke="#E0E0E0" fill="#FFFFFF" x="0.5" y="0.5" width="300" height="80" rx="4"></rect>
            
            <g id="Status-Icon-Placeholder" transform="translate(20.000000, 20.000000)">
                <circle id="Icon-Bg" fill="#31DA9F" opacity="0.2" cx="20" cy="20" r="20"></circle>
                <circle id="Icon-Core" fill="#31DA9F" cx="20" cy="20" r="10"></circle>
            </g>

            <g id="Content-Placeholder" transform="translate(70.000000, 22.000000)">
                <rect id="Title-Line" fill="#EBEBEB" x="0" y="0" width="140" height="8" rx="2"></rect>
                
                <rect id="Desc-Line-1" fill="#F5F5F5" x="0" y="18" width="200" height="6" rx="1"></rect>
