<?xml version="1.0" encoding="UTF-8"?>
<svg width="400px" height="340px" viewBox="0 0 400 340" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/svg">
    <title>PDF Viewer Skeleton</title>
    <g id="组件骨架图-PDF查看器" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">

        <!-- 外层容器 -->
        <rect id="Viewer-Container" stroke="#E0E0E0" fill="#FFFFFF" x="0.5" y="0.5" width="399" height="339" rx="4"></rect>

        <!-- PDF 页面模拟 -->
        <g id="PDF-Page" transform="translate(40.000000, 20.000000)">
            <rect stroke="#E0E0E0" fill="#FAFAFA" x="0.5" y="0.5" width="299" height="299" rx="2"></rect>

            <!-- 页面标题 -->
            <rect fill="#EBEBEB" x="20" y="20" width="140" height="12" rx="2"></rect>
            <rect fill="#E0E0E0" x="20" y="40" width="260" height="1"></rect>

            <!-- 段落文本行 -->
            <rect fill="#F5F5F5" x="20" y="56" width="240" height="7" rx="1"></rect>
            <rect fill="#F5F5F5" x="20" y="70" width="220" height="7" rx="1"></rect>
            <rect fill="#F5F5F5" x="20" y="84" width="250" height="7" rx="1"></rect>
            <rect fill="#F5F5F5" x="20" y="98" width="180" height="7" rx="1"></rect>

            <!-- 小标题 -->
            <rect fill="#EBEBEB" x="20" y="122" width="100" height="10" rx="2"></rect>

            <!-- 第二段落 -->
            <rect fill="#F5F5F5" x="20" y="146" width="230" height="7" rx="1"></rect>
            <rect fill="#F5F5F5" x="20" y="160" width="250" height="7" rx="1"></rect>
            <rect fill="#F5F5F5" x="20" y="174" width="200" height="7" rx="1"></rect>
            <rect fill="#F5F5F5" x="20" y="188" width="240" height="7" rx="1"></rect>
            <rect fill="#F5F5F5" x="20" y="202" width="160" height="7" rx="1"></rect>

            <!-- 图片占位 -->
            <rect stroke="#E0E0E0" fill="#F0F0F0" x="20" y="224" width="120" height="56" rx="2"></rect>
            <g transform="translate(56.000000, 238.000000)">
                <polygon fill="#D8D8D8" points="12,0 24,20 0,20"></polygon>
                <circle fill="#D8D8D8" cx="36" cy="6" r="6"></circle>
            </g>
        </g>

        <!-- 右侧滚动条 -->
        <g id="Scrollbar" transform="translate(355.000000, 20.000000)">
            <rect fill="#F5F5F5" x="0" y="0" width="6" height="299" rx="3"></rect>
            <!-- 滑块 -->
            <rect fill="#31DA9F" x="0" y="0" width="6" height="60" rx="3" opacity="0.6"></rect>
            <!-- 页码标签 -->
            <rect fill="#31DA9F" x="-18" y="22" width="28" height="18" rx="4" opacity="0.8"></rect>
            <text x="-4" y="35" font-size="9" fill="#FFFFFF" text-anchor="middle" font-weight="bold">1</text>
        </g>

        <!-- 左下角缩放按钮组 -->
        <g id="Zoom-Controls" transform="translate(16.000000, 296.000000)">
            <rect fill="#333333" fill-opacity="0.85" x="0" y="0" width="108" height="28" rx="8"></rect>
            <!-- 缩小图标 -->
            <line x1="16" y1="14" x2="28" y2="14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"></line>
            <!-- 分割线 -->
            <line x1="40" y1="6" x2="40" y2="22" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1"></line>
            <!-- 自适应图标 -->
            <rect stroke="#FFFFFF" fill="none" x="50" y="7" width="14" height="14" rx="1" stroke-width="1.5"></rect>
            <!-- 分割线 -->
            <line x1="72" y1="6" x2="72" y2="22" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1"></line>
            <!-- 放大图标 -->
            <line x1="84" y1="14" x2="96" y2="14" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"></line>
            <line x1="90" y1="8" x2="90" y2="20" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"></line>
        </g>

        <!-- 右下角回到顶部按钮 -->
        <g id="Back-To-Top" transform="translate(328.000000, 296.000000)">
            <rect fill="#333333" fill-opacity="0.85" x="0" y="0" width="28" height="28" rx="14"></rect>
            <polyline stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" points="14,20 14,10 8,15"></polyline>
            <polyline stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" points="14,10 20,15"></polyline>
        </g>

    </g>
</svg>
