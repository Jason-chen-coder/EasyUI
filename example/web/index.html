<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="example">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Easy UI Example</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      background: #f7fafc;
    }

    #app_splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 50% 32%, rgba(49, 218, 159, 0.18), transparent 28rem),
        linear-gradient(145deg, #ffffff 0%, #eef7ff 52%, #eafaf3 100%);
      color: #13202f;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition:
        opacity 220ms ease,
        visibility 220ms ease;
    }

    #app_splash.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .easy-splash-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      transform: translateY(-8px);
    }

    .easy-splash-mark {
      position: relative;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow:
        0 18px 50px rgba(19, 32, 47, 0.16),
        inset 0 0 0 1px rgba(20, 132, 252, 0.12);
    }

    .easy-splash-mark::before {
      content: "";
      position: absolute;
      border-radius: 999px;
    }

    .easy-splash-mark::before {
      inset: -5px;
      border: 3px solid rgba(20, 132, 252, 0.14);
      border-top-color: #31da9f;
      animation: easySplashSpin 900ms linear infinite;
    }

    .easy-splash-logo {
      position: relative;
      z-index: 1;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      filter: drop-shadow(0 8px 16px rgba(20, 132, 252, 0.16));
    }

    .easy-splash-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
    }

    @keyframes easySplashSpin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <div id="app_splash" role="status" aria-live="polite" aria-label="Easy UI loading">
    <div class="easy-splash-panel">
      <div class="easy-splash-mark" aria-hidden="true">
        <img class="easy-splash-logo" src="icons/easy-ui-logo.png" alt="">
      </div>
      <div class="easy-splash-title">Easy UI Loading...</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js?v=20260518-card-fade-in-fix" async></script>
</body>
</html>
