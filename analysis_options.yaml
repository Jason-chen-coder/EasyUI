include: package:flutter_lints/flutter.yaml

# The migrated package preserves legacy upstream behavior and public APIs.
# Keep strict analyzer clean while leaving broad modernization as a follow-up.
analyzer:
  errors:
    dead_code: ignore
    dead_null_aware_expression: ignore
    deprecated_member_use: ignore
    unnecessary_null_comparison: ignore
    unused_element: ignore
    unused_field: ignore
    unused_local_variable: ignore

linter:
  rules:
    avoid_print: false
    constant_identifier_names: false
    library_prefixes: false
    library_private_types_in_public_api: false
    overridden_fields: false
    unintended_html_in_doc_comment: false
    use_build_context_synchronously: false
    use_full_hex_values_for_flutter_colors: false
    use_super_parameters: false
